<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>📦 Inventario - SOA</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; background: #f4f4f9; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        input, button { padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button { background: #4CAF50; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #45a049; }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #FF9800; color: white; }
        .error { color: red; font-size: 0.9rem; }
        .success { color: green; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>📦 Gestión de Inventario</h1>
        
        <div id="login-section">
            <h3>🔐 Iniciar Sesión</h3>
            <input type="text" id="username" placeholder="Usuario (ej: admin)">
            <input type="password" id="password" placeholder="Contraseña (ej: admin123)">
            <button onclick="login()">Entrar</button>
            <p id="login-error" class="error"></p>
        </div>
        
        <div id="crud-section" class="hidden">
            <button onclick="logout()" style="background: #f44336; width: auto;">🚪 Cerrar Sesión</button>
            <button onclick="cargarInventario()" style="background: #2196F3; width: auto; float: right;">🔄 Actualizar</button>
            <br><br>
            
            <h3>➕ Nuevo Registro de Inventario</h3>
            <input type="number" id="id_producto" placeholder="ID del Producto *">
            <input type="number" id="cantidad" placeholder="Cantidad en Stock *">
            <button onclick="crearRegistro()">Guardar</button>
            <p id="msg"></p>
            
            <h3>📋 Lista de Inventario</h3>
            <table id="tabla">
                <thead>
                    <tr><th>ID Producto</th><th>Cantidad</th><th>Actualizado</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        let token = '';

        async function login() {
            const fd = new URLSearchParams();
            fd.append('username', document.getElementById('username').value);
            fd.append('password', document.getElementById('password').value);
            try {
                const res = await fetch('/auth/token', { method: 'POST', headers: {'Content-Type': 'application/x-www-form-urlencoded'}, body: fd });
                if (!res.ok) throw new Error('Credenciales incorrectas');
                const data = await res.json();
                token = data.access_token;
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('crud-section').classList.remove('hidden');
                cargarInventario();
            } catch (e) {
                document.getElementById('login-error').textContent = e.message;
            }
        }

        function logout() {
            token = '';
            document.getElementById('crud-section').classList.add('hidden');
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('msg').textContent = '';
        }

        async function cargarInventario() {
            try {
                const res = await fetch('/v2/inventario', { headers: {'Authorization': `Bearer ${token}`} });
                if (!res.ok) throw new Error('Error al cargar');
                const datos = await res.json();
                document.querySelector('#tabla tbody').innerHTML = datos.map(d => `
                    <tr><td>${d.id_producto}</td><td><strong>${d.cantidad}</strong></td><td>${d.updated_at || '-'}</td></tr>
                `).join('');
            } catch (e) { alert('Error: ' + e.message); }
        }

        async function crearRegistro() {
            const nuevo = {
                id_producto: parseInt(document.getElementById('id_producto').value),
                cantidad: parseInt(document.getElementById('cantidad').value)
            };
            const msgEl = document.getElementById('msg');
            msgEl.textContent = 'Guardando...';
            try {
                const res = await fetch('/v2/inventario', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(nuevo)
                });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(Array.isArray(err.detail) ? err.detail[0].msg : err.detail);
                }
                msgEl.textContent = '✅ Registro guardado';
                msgEl.className = 'success';
                document.getElementById('id_producto').value = '';
                document.getElementById('cantidad').value = '';
                cargarInventario();
            } catch (e) {
                msgEl.textContent = '❌ ' + e.message;
                msgEl.className = 'error';
            }
        }
    </script>
</body>
</html>
