<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>📋 Pedidos - SOA</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; background: #f4f4f9; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        input, button { padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button { background: #9C27B0; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #7B1FA2; }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #9C27B0; color: white; }
        .error { color: red; font-size: 0.9rem; }
        .success { color: green; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>📋 Gestión de Pedidos (Orquestador)</h1>
        
        <div id="login-section">
            <h3>🔐 Iniciar Sesión</h3>
            <input type="text" id="username" placeholder="Usuario (ej: admin)">
            <input type="password" id="password" placeholder="Contraseña (ej: admin123)">
            <button onclick="login()">Entrar</button>
            <p id="login-error" class="error"></p>
        </div>
        
        <div id="crud-section" class="hidden">
            <button onclick="logout()" style="background: #f44336; width: auto;">🚪 Cerrar Sesión</button>
            <button onclick="cargarPedidos()" style="background: #2196F3; width: auto; float: right;">🔄 Actualizar</button>
            <br><br>
            
            <h3>➕ Nuevo Pedido</h3>
            <p style="font-size: 0.9em; color: #666;">💡 El sistema validará automáticamente el Cliente, el Producto y el Stock.</p>
            <input type="number" id="id_cliente" placeholder="ID del Cliente *">
            <input type="number" id="id_producto" placeholder="ID del Producto *">
            <input type="number" id="cantidad" placeholder="Cantidad *">
            <button onclick="crearPedido()">Registrar Pedido</button>
            <p id="msg"></p>
            
            <h3>📋 Lista de Pedidos</h3>
            <table id="tabla">
                <thead>
                    <tr>
                        <th>ID Pedido</th>
                        <th>ID Cliente</th>
                        <th>ID Producto</th>
                        <th>Cantidad</th>
                        <th>Fecha</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        let token = '';

        async function login() {
            const fd = new URLSearchParams();
            fd.append('username', document.getElementById('username').value);
            fd.append('password', document.getElementById('password').value);
            try {
                const res = await fetch('/auth/token', { method: 'POST', headers: {'Content-Type': 'application/x-www-form-urlencoded'}, body: fd });
                if (!res.ok) throw new Error('Credenciales incorrectas');
                const data = await res.json();
                token = data.access_token;
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('crud-section').classList.remove('hidden');
                cargarPedidos();
            } catch (e) {
                document.getElementById('login-error').textContent = e.message;
            }
        }

        function logout() {
            token = '';
            document.getElementById('crud-section').classList.add('hidden');
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('msg').textContent = '';
        }

        async function cargarPedidos() {
            try {
                const res = await fetch('/v3/pedidos', { headers: {'Authorization': `Bearer ${token}`} });
                if (!res.ok) throw new Error('Error al cargar');
                const datos = await res.json();
                document.querySelector('#tabla tbody').innerHTML = datos.map(d => `
                    <tr>
                        <td>${d.pedido_id || d.id_pedido}</td>
                        <td>${d.id_cliente}</td>
                        <td>${d.id_producto}</td>
                        <td>${d.cantidad}</td>
                        <td>${d.created_at || '-'}</td>
                    </tr>
                `).join('');
            } catch (e) { alert('Error: ' + e.message); }
        }

        async function crearPedido() {
            const nuevo = {
                id_cliente: parseInt(document.getElementById('id_cliente').value),
                id_producto: parseInt(document.getElementById('id_producto').value),
                cantidad: parseInt(document.getElementById('cantidad').value)
            };
            const msgEl = document.getElementById('msg');
            msgEl.textContent = '⏳ Procesando (validando cliente, producto y stock en otros servicios)...';
            msgEl.className = '';
            
            try {
                const res = await fetch('/v3/pedidos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(nuevo)
                });
                const resData = await res.json();
                
                if (!res.ok) {
                    throw new Error(Array.isArray(resData.detail) ? resData.detail[0].msg : resData.detail);
                }
                
                msgEl.textContent = `✅ Pedido registrado exitosamente. ID: ${resData.pedido_id}`;
                msgEl.className = 'success';
                
                document.getElementById('id_cliente').value = '';
                document.getElementById('id_producto').value = '';
                document.getElementById('cantidad').value = '';
                
                cargarPedidos();
            } catch (e) {
                msgEl.textContent = '❌ ' + e.message;
                msgEl.className = 'error';
            }
        }
    </script>
</body>
</html>
