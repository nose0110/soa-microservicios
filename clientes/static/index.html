<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>📋 Clientes - SOA</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; background: #f4f4f9; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        input, button { padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button { background: #4CAF50; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #45a049; }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #4CAF50; color: white; }
        .error { color: red; font-size: 0.9rem; }
        .success { color: green; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>📋 Gestión de Clientes</h1>
        
        <!-- LOGIN -->
        <div id="login-section">
            <h3>🔐 Iniciar Sesión</h3>
            <input type="text" id="username" placeholder="Usuario (ej: admin)">
            <input type="password" id="password" placeholder="Contraseña (ej: admin123)">
            <button onclick="login()">Entrar</button>
            <p id="login-error" class="error"></p>
        </div>
        
        <!-- CRUD -->
        <div id="crud-section" class="hidden">
            <button onclick="logout()" style="background: #f44336; width: auto;">🚪 Cerrar Sesión</button>
            <button onclick="cargarClientes()" style="background: #2196F3; width: auto; float: right;">🔄 Actualizar</button>
            <br><br>
            
            <h3>➕ Nuevo Cliente</h3>
            <input type="text" id="nombre" placeholder="Nombre completo *">
            <input type="email" id="correo" placeholder="Correo electrónico *">
            <input type="text" id="direccion" placeholder="Dirección (opcional)">
            <input type="text" id="telefono" placeholder="Teléfono (opcional)">
            <button onclick="crearCliente()">Guardar Cliente</button>
            <p id="msg"></p>
            
            <h3>📋 Lista de Clientes</h3>
            <table id="tabla">
                <thead>
                    <tr><th>ID</th><th>Nombre</th><th>Correo</th><th>Dirección</th><th>Teléfono</th><th>Activo</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        let token = '';

        async function login() {
            const fd = new URLSearchParams();
            fd.append('username', document.getElementById('username').value);
            fd.append('password', document.getElementById('password').value);
            
            try {
                const res = await fetch('/auth/token', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: fd
                });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Credenciales incorrectas');
                }
                const data = await res.json();
                token = data.access_token;
                
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('crud-section').classList.remove('hidden');
                cargarClientes();
            } catch (e) {
                document.getElementById('login-error').textContent = e.message;
            }
        }

        function logout() {
            token = '';
            document.getElementById('crud-section').classList.add('hidden');
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('msg').textContent = '';
        }

        async function cargarClientes() {
            try {
                const res = await fetch('/v2/clientes', {
                    headers: {'Authorization': `Bearer ${token}`}
                });
                if (!res.ok) throw new Error('Error al cargar');
                
                const clientes = await res.json();
                document.querySelector('#tabla tbody').innerHTML = clientes.map(c => `
                    <tr>
                        <td>${c.id_cliente || c.cliente_id}</td>
                        <td>${c.nombre}</td>
                        <td>${c.correo}</td>
                        <td>${c.direccion || '-'}</td>
                        <td>${c.telefono || '-'}</td>
                        <td>${c.activo ? '✅' : '❌'}</td>
                    </tr>
                `).join('');
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }

        async function crearCliente() {
            const nuevo = {
                nombre: document.getElementById('nombre').value,
                correo: document.getElementById('correo').value,
                direccion: document.getElementById('direccion').value || "",
                telefono: document.getElementById('telefono').value || ""
            };
            
            const msgEl = document.getElementById('msg');
            msgEl.textContent = 'Guardando...';
            msgEl.className = '';

            try {
                const res = await fetch('/v2/clientes', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(nuevo)
                });
                
                if (!res.ok) {
                    const err = await res.json();
                    // FastAPI devuelve el error detallado en "detail"
                    const errorMsg = Array.isArray(err.detail) 
                        ? err.detail.map(d => `${d.loc.join('.')}: ${d.msg}`).join(', ') 
                        : (err.detail || 'Error desconocido');
                    throw new Error(errorMsg);
                }
                
                msgEl.textContent = '✅ Cliente creado exitosamente';
                msgEl.className = 'success';
                
                // Limpiar campos
                document.getElementById('nombre').value = '';
                document.getElementById('correo').value = '';
                document.getElementById('direccion').value = '';
                document.getElementById('telefono').value = '';
                
                cargarClientes();
            } catch (e) {
                msgEl.textContent = '❌ ' + e.message;
                msgEl.className = 'error';
            }
        }
    </script>
</body>
</html>
